# Yarn 4 config for the account-dashboard-app.
#
# nodeLinker: node-modules keeps a conventional node_modules tree (Vite + the
# linked @wardnet/* packages resolve their externalised peers against it).
nodeLinker: node-modules

# @wardnet packages are published to GitHub Packages. The auth token is read
# from the environment — NEVER commit a token.
#   • Local:  `gh auth refresh -s read:packages` then export the token, e.g.
#             `export NODE_AUTH_TOKEN="$(gh auth token)"`.
#   • CI:     the workflow exports the built-in GITHUB_TOKEN (packages: read).
#
# During co-development the @wardnet/{ui,styles} deps in package.json use the
# `link:` protocol to the sibling design-system checkout, so this registry is
# only hit once they are flipped to the published `^0.2.0` range at tie-up.
npmScopes:
  wardnet:
    npmRegistryServer: "https://npm.pkg.github.com"
    npmAlwaysAuth: true
    npmAuthToken: "${NODE_AUTH_TOKEN-}"

# Yarn's minimum-release-age gate (npmMinimalAgeGate, a 24h default) quarantines
# freshly-published versions as a supply-chain safeguard. Our own first-party
# @wardnet/* packages are trusted, so exempt just that scope (third-party deps stay
# gated) — otherwise a same-day DS release is uninstallable here for a day, which the
# publish-then-flip tie-up hits every release. Mirrors the wardnet repo's .yarnrc.yml.
npmPreapprovedPackages:
  - "@wardnet/*"

enableImmutableInstalls: false
