[package]
name = "wardnet-cloud"
version = "0.1.0"
edition = "2024"
rust-version = "1.96"
license = "MIT"
description = "Wardnet cloud services — Tenants / DDNS / Tunneller (pre-split monolith)"

[lib]
name = "wardnet_cloud"
path = "src/lib.rs"

[[bin]]
name = "wardnet-cloud"
path = "src/main.rs"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"

[dependencies]
# https://crates.io/crates/axum
axum = { version = "0.8", features = ["macros", "ws"] }
# https://crates.io/crates/tokio
tokio = { version = "1", features = ["full"] }
# https://crates.io/crates/tower
tower = { version = "0.5", features = ["util"] }
# https://crates.io/crates/tower-http
tower-http = { version = "0.6", features = ["trace"] }

# https://crates.io/crates/sqlx
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "chrono", "migrate"] }

# https://crates.io/crates/serde
serde = { version = "1.0", features = ["derive"] }
# https://crates.io/crates/serde_json
serde_json = "1.0"

# https://crates.io/crates/tracing
tracing = "0.1"
# https://crates.io/crates/tracing-subscriber
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# https://crates.io/crates/uuid
uuid = { version = "1", features = ["v4"] }
# https://crates.io/crates/chrono
chrono = { version = "0.4", features = ["serde"] }

# https://crates.io/crates/thiserror
thiserror = "2"
# https://crates.io/crates/anyhow
anyhow = "1"

# https://crates.io/crates/reqwest
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# https://crates.io/crates/ed25519-dalek — Ed25519 request-signature verification + PKCS#8/PEM
# handling for the Tenants JWT signing keypair (pkcs8/pem features). Daemon private key never leaves Pi.
ed25519-dalek = { version = "2", default-features = false, features = ["std", "pkcs8", "pem"] }
# https://crates.io/crates/sha2 — SHA-256 for bearer-token hashing and signature payload construction
sha2 = "0.11"
# https://crates.io/crates/hex — hex encoding for token hashes and body digests
hex = "0.4"
# https://crates.io/crates/base64 — base64 decoding for public keys and signatures sent over HTTP headers
base64 = "0.22"
# https://crates.io/crates/rand — CSPRNG for bearer-token generation
rand = "0.10"

# https://crates.io/crates/async-trait
async-trait = "0.1"

# https://crates.io/crates/dashmap — concurrent hash map for the tunnel registry
dashmap = "6"

# https://crates.io/crates/arc-swap — lock-free hot-swap of the mesh mTLS reqwest client on cert rotation
arc-swap = "1"

# https://crates.io/crates/futures-util — split WebSocket into send/recv halves
futures-util = { version = "0.3", default-features = false, features = ["sink", "alloc"] }

# https://crates.io/crates/utoipa
utoipa = { version = "5", features = ["axum_extras", "chrono", "uuid"] }
# https://crates.io/crates/utoipa-axum
utoipa-axum = "0.2"

# ── TLS termination + ACME (bridge-owned, replaces Caddy) ──────────────────────
# https://crates.io/crates/instant-acme — async ACME (RFC 8555) client; bridge issues its own FQDN cert via HTTP-01
instant-acme = "0.8.5"
# https://crates.io/crates/rcgen — leaf keypair + CSR generation for the issued certificate
rcgen = "0.14.8"
# https://crates.io/crates/x509-parser — parse the leaf cert's not_after for renewal scheduling
x509-parser = "0.18"
# https://crates.io/crates/rustls — TLS server config for terminating the bridge's own SNI on :8443
rustls = { version = "0.23", features = ["aws_lc_rs"] }
# https://crates.io/crates/tokio-rustls — async TLS acceptor wrapping the peeked TcpStream
tokio-rustls = "0.26"
# https://crates.io/crates/rustls-pemfile — parse issued chain + leaf key PEM into rustls types
rustls-pemfile = "2"
# https://crates.io/crates/hyper — serve the axum Router over a single TLS-terminated connection
hyper = { version = "1", features = ["http1", "http2", "server"] }
# https://crates.io/crates/hyper-util — Tower/axum service adapter + TokioIo for hyper::server
hyper-util = { version = "0.1", features = ["server", "tokio", "service"] }
# https://crates.io/crates/aes-gcm — AES-256-GCM seal for cert/account material at rest in Postgres
aes-gcm = "0.10"
# https://crates.io/crates/jsonwebtoken — Tenants-signed identity JWT (EdDSA). rust_crypto backend so
# the JWT signing key shares ed25519-dalek's PKCS#8 handling (no aws-lc v2-only key-format mismatch).
jsonwebtoken = { version = "10.4.0", default-features = false, features = ["use_pem", "rust_crypto"] }

[dev-dependencies]
# https://crates.io/crates/http-body-util
http-body-util = "0.1"
# https://crates.io/crates/ed25519-dalek — signing for test keypair generation (std implies signature)
ed25519-dalek = { version = "2", default-features = false, features = ["std"] }
# https://crates.io/crates/serde_json — JSON helpers in integration tests
serde_json = "1.0"
# https://crates.io/crates/wiremock — mock HTTP server for Cloudflare provider tests
wiremock = "0.6"
# https://crates.io/crates/tokio-tungstenite — WebSocket client for integration tests
tokio-tungstenite = "0.29"
