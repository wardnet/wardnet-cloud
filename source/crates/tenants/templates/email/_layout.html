<!doctype html>
<html lang="en">
<body style="margin:0;padding:0;background:#f4f3ee;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f3ee;padding:32px 12px;">
    <tr><td align="center">
      <table role="presentation" cellpadding="0" cellspacing="0" style="width:100%;max-width:480px;background:#ffffff;border:1px solid #e6e4dc;border-radius:14px;">
        <tr><td style="padding:30px 34px;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
          {% if logo_url.is_empty() %}
          <table role="presentation" cellpadding="0" cellspacing="0"><tr>
            <td style="width:30px;height:30px;background:#12b981;border-radius:8px;color:#11152b;font-weight:800;font-size:17px;text-align:center;vertical-align:middle;">W</td>
            <td style="padding-left:10px;font-size:18px;font-weight:700;color:#11152b;">Wardnet</td>
          </tr></table>
          {% else %}
          <img src="{{ logo_url }}" alt="Wardnet" height="30" style="display:block;border:0;outline:none;text-decoration:none;">
          {% endif %}
          {% block content %}{% endblock %}
        </td></tr>
      </table>
      <p style="margin:16px 0 0;font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#8a90a6;">Wardnet · secure mesh networking</p>
    </td></tr>
  </table>
</body>
</html>
