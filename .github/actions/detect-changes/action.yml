name: Detect changes
description: >-
  Classifies the changed paths of a push/PR into per-service buckets
  (tenants, ddns, tunneller) plus an `all` bucket for changes that force
  every service to rebuild. Used by the CI/PR orchestrators to gate the
  heavy per-service reusable leaves and skip noop builds.

  All filter rules live here so adding a new area is a one-file change
  instead of editing every orchestrator.

outputs:
  all:
    description: >-
      'true' when shared code (common), the lockfile/manifest, xtask, the
      e2e harness, the Makefile, or ANY CI config changed — i.e. a change
      that can affect every service. Orchestrators treat this as
      "run everything".
    value: ${{ steps.filter.outputs.all }}
  tenants:
    description: "'true' when the tenants service crate changed."
    value: ${{ steps.filter.outputs.tenants }}
  ddns:
    description: "'true' when the ddns service crate changed."
    value: ${{ steps.filter.outputs.ddns }}
  tunneller:
    description: "'true' when the tunneller service crate changed."
    value: ${{ steps.filter.outputs.tunneller }}
  account-dashboard-app:
    description: "'true' when the My Account SPA changed."
    value: ${{ steps.filter.outputs.account-dashboard-app }}

runs:
  using: composite
  steps:
    - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
      id: filter
      with:
        # `all` is the "run everything" bucket: anything cross-service
        # (the shared `common` crate, the workspace manifest/lockfile,
        # xtask, the e2e harness, the Makefile) plus every CI config
        # change — a workflow/action edit can invalidate any assumption,
        # so the only honest response is a full validation.
        filters: |
          all:
            - 'source/crates/common/**'
            - 'source/Cargo.toml'
            - 'source/Cargo.lock'
            - 'source/rust-toolchain.toml'
            - 'source/xtask/**'
            - 'source/end2end-tests/**'
            - 'source/Makefile'
            - '.github/**'
          # A "service" deployable spans its domain lib + thin bin crate; the
          # tenants binary additionally composes the subscriptions + billing libs
          # (ADR-0010), so a change to any of them rebuilds tenants.
          tenants:
            - 'source/crates/tenants/**'
            - 'source/crates/app-tenants/**'
            - 'source/crates/subscriptions/**'
            - 'source/crates/billing/**'
            - 'source/docs/openapi/tenants.json'
          ddns:
            - 'source/crates/ddns/**'
            - 'source/crates/app-ddns/**'
            - 'source/docs/openapi/ddns.json'
          tunneller:
            - 'source/crates/tunneller/**'
            - 'source/crates/app-tunneller/**'
            - 'source/docs/openapi/tunneller.json'
          # The My Account SPA is a self-contained yarn project; its own changes
          # only need the frontend leaf (Rust services are unaffected).
          account-dashboard-app:
            - 'source/account-dashboard-app/**'
