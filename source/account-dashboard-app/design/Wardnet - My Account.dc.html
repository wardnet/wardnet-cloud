  // ====================================================================
  //  AUTH
  // ====================================================================
  renderAuth() {
    const s = this.state;
    if (s.authScreen === 'register') return this.renderRegister();
    if (s.authScreen === 'forgot') return this.renderForgot();
    if (s.authScreen === 'confirm') return this.renderConfirm();
    if (s.authScreen === 'setpw') return this.renderSetPw();
    return this.renderSignIn();
  }

  renderSignIn() {

      h('div', { style: { display: 'flex', flexDirection: 'column', gap: 4 } },
        h(ui.Heading, { level: 2 }, 'Sign in'),
        h(ui.Text, { variant: 'caption' }, 'Access your Wardnet Cloud account.')),
      note ? h(ui.Banner, { tone: 'info', role: 'status', icon: self.icons.check }, note) : null,
      this.providerButtons(),
      this.divider('or'),

    const foot = h(ui.Text, { variant: 'caption' }, "Don't have an account?  ",

  requestCode(flow) {
    const email = (this.state.pendingEmail || '').trim();
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {

  }
  setCode(i, v) {

    if (digit && this._codeRefs[i + 1]) this._codeRefs[i + 1].focus();
  }
  codeKey(i, e) {
    if (e.key === 'Backspace' && !this.state.code[i] && this._codeRefs[i - 1]) {

      this._codeRefs[i - 1].focus();
    } else if (e.key === 'ArrowRight' && this._codeRefs[i + 1]) {
      this._codeRefs[i + 1].focus();
    } else if (e.key === 'Enter') {

    const last = Math.min(text.length, 6) - 1;
    if (this._codeRefs[last]) this._codeRefs[last].focus();

    if (this.state.flow === 'reset') {

    const body = h('div', { style: { display: 'flex', flexDirection: 'column', gap: 18 } },
