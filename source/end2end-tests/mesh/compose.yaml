# End-to-end mesh-mTLS topology: real Tenants + DDNS over SPIFFE mesh mTLS, two
# Postgres instances (global identity + regional operational), and a wiremock
# standing in for the Cloudflare API. Driven by `source/Makefile` (`make e2e-all`).
#
# Build context for the service images is the workspace root (`../..` → source/).
# Mesh leaves, the trust bundle, and the JWT keypair are generated by the xtask
# (`cargo run -p xtask -- gen-certs end2end-tests/mesh/certs`) and mounted read-only.

name: wardnet-e2e-mesh

services:
  pg-global:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  pg-regional:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  # Mock Cloudflare v4 API — DDNS points CLOUDFLARE_API_BASE here, so the harness
  # never touches a real Cloudflare zone.
  cloudflare:
    image: wiremock/wiremock:3.9.1
    command: ["--port", "8080", "--disable-banner"]
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro

  # OTLP collector + backends (Grafana / Prometheus / Tempo / Loki) bundled in one
  # image. Tenants and DDNS export to it over OTLP/HTTP (`otel-lgtm:4318`); the
  # observability test queries the Prometheus / Tempo / Loki HTTP APIs (exposed to
  # the host) to assert the three signals actually landed. Stands in for Grafana
  # Cloud — the only production difference is the OTLP endpoint URL.
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "13000:3000" # Grafana UI (manual inspection)
      - "19090:9090" # Prometheus query API
      - "13200:3200" # Tempo query API
      - "13100:3100" # Loki query API

  tenants:
    build:
      context: ../..
      dockerfile: crates/tenants/Dockerfile
    environment:
      GLOBAL_DATABASE_URL: postgres://postgres:postgres@pg-global:5432/postgres
      INFORGE_DEPLOYMENT_REGION_SLUG: use1
      KNOWN_REGIONS: use1
      # WS-G billing + WS-F web-auth config. Dummies — neither Stripe nor the
      # cookie jar is exercised by the mesh/observability flow, but Config::from_env
      # requires them, so the service can't boot without them.
      ACCOUNT_BASE_URL: http://tenants
      STRIPE_SECRET_KEY: sk_test_e2e_dummy
      STRIPE_WEBHOOK_SECRET: whsec_e2e_dummy
      COOKIE_KEY: e2e-cookie-key-with-enough-entropy-to-exceed-sixty-four-bytes-xxxxxx
      API_LISTEN_ADDR: 0.0.0.0:80
      MESH_LISTEN_ADDR: 0.0.0.0:9443
      MTLS_TRUST_BUNDLE_PATH: /certs/bundle.pem
      MTLS_LEAF_CERT_PATH: /certs/tenants.cert.pem
      MTLS_LEAF_KEY_PATH: /certs/tenants.key.pem
      JWT_SIGNING_KEY_PATH: /certs/jwt-signing.pem
      JWT_VERIFY_KEY_PATH: /certs/jwt-verify.pem
      # Fast sweep so the tombstone is reaped within the test's poll window.
      TENANT_SWEEP_INTERVAL_SECS: "2"
      RUST_LOG: info
      # Observability: export OTLP to the bundled collector. Short metric interval
      # so the periodic reader flushes within the observability test's poll window.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_METRIC_EXPORT_INTERVAL: "3000"
      # INFORGE-injected resource identity (dummies here; `region` comes from
      # INFORGE_DEPLOYMENT_REGION_SLUG above).
      INFORGE_SERVICE_NAMESPACE: wardnet
      INFORGE_INSTANCE_ID: tenants-e2e-0
      INFORGE_HOST_ID: e2e-node-0
      INFORGE_DEPLOYMENT_ENV: e2e
    depends_on:
      pg-global:
        condition: service_healthy
      otel-lgtm:
        condition: service_started
    volumes:
      - ./certs:/certs:ro
    ports:
      - "18080:80"
    # `/v1/health` returns 200 only after the API listener binds (post-migrations),
    # so `healthy` means "migrations applied, serving". The API listener is
    # PROXY-v1-required and fail-closed (invariant #13) — a header-less request is
    # dropped — so the probe MUST prepend a PROXY v1 header: `curl --haproxy-protocol`
    # emits `PROXY TCP4 127.0.0.1 127.0.0.1 <sport> 80\r\n` ahead of the GET.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--haproxy-protocol", "http://localhost:80/v1/health"]
      interval: 2s
      timeout: 5s
      retries: 45 # ~90s ceiling for a cold, loaded-runner boot
      start_period: 5s

  ddns:
    build:
      context: ../..
      dockerfile: crates/ddns/Dockerfile
    depends_on:
      pg-regional:
        condition: service_healthy
      tenants:
        # Wait for the tenants app to actually serve (not just the container to
        # start) — closes the ddns-provisioner-races-tenants-boot gap.
        condition: service_healthy
      cloudflare:
        condition: service_started
      otel-lgtm:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@pg-regional:5432/postgres
      CLOUDFLARE_API_TOKEN: e2e-dummy-token
      CLOUDFLARE_ZONE_ID: e2e-zone
      CLOUDFLARE_API_BASE: http://cloudflare:8080
      SUBDOMAIN_PARENT: e2e.wardnet.test
      INFORGE_DEPLOYMENT_REGION_SLUG: use1
      API_LISTEN_ADDR: 0.0.0.0:80
      MESH_BASE_URL: https://tenants:9443
      MTLS_TRUST_BUNDLE_PATH: /certs/bundle.pem
      MTLS_LEAF_CERT_PATH: /certs/ddns.cert.pem
      MTLS_LEAF_KEY_PATH: /certs/ddns.key.pem
      # DDNS verifies daemon JWTs on its report-IP / ACME endpoints (offline).
      JWT_VERIFY_KEY_PATH: /certs/jwt-verify.pem
      # Tight reconcile loops so provision/reap happen within the test's poll window.
      PROVISIONER_INTERVAL_SECS: "2"
      REAPER_INTERVAL_SECS: "2"
      REAPER_JITTER_SECS: "0"
      RUST_LOG: info
      # Observability: export OTLP to the bundled collector (short metric interval).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_METRIC_EXPORT_INTERVAL: "3000"
      # INFORGE-injected resource identity (dummies here; `region` comes from
      # INFORGE_DEPLOYMENT_REGION_SLUG above).
      INFORGE_SERVICE_NAMESPACE: wardnet
      INFORGE_INSTANCE_ID: ddns-e2e-0
      INFORGE_HOST_ID: e2e-node-0
      INFORGE_DEPLOYMENT_ENV: e2e
    volumes:
      - ./certs:/certs:ro
    # `/v1/health` returns 200 only after the API listener binds (post-migrations).
    # `--haproxy-protocol` prepends the PROXY v1 header the fail-closed API listener
    # requires (invariant #13); a plain curl would be dropped.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--haproxy-protocol", "http://localhost:80/v1/health"]
      interval: 2s
      timeout: 5s
      retries: 45 # ~90s ceiling for a cold, loaded-runner boot
      start_period: 5s
