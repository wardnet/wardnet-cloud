# Local dev stack for exercising the **My Account SPA** against the *real*
# `tenants` backend — auth (password + Google/GitHub OIDC), verification-code
# email (Resend), and the Stripe paid lifecycle — instead of the MSW mock layer.
#
# Topology:  browser → Vite dev (:5173, proxies /v1) → nginx (:8080, L4 stream,
#            prepends PROXY-protocol v1) → tenants (:80, plain HTTP).
# The nginx hop exists solely to satisfy the API listener's fail-closed PROXY v1
# requirement (crates/common/src/serve.rs `read_required`); it mirrors prod nginx.
#
# Build context is the workspace root (`..` → source/), same images as prod.
# Secrets live in a gitignored `.env` beside this file (see `.env.example`).
# Mesh leaves + the JWT keypair are generated by the xtask and mounted read-only:
#   cargo run -p xtask -- gen-certs dev-stack/certs   (or: make dev-certs)
#
# Usage (from source/):  make dev-up   /   make dev-down   /   make dev-logs

name: wardnet-account-dev

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    # Host port 55432 to avoid clashing with source/docker-compose.yml (5432).
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  tenants:
    build:
      context: ..
      dockerfile: crates/tenants/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    # Secrets (Stripe / Google / GitHub / Resend / COOKIE_KEY) come from .env.
    env_file:
      - .env
    environment:
      GLOBAL_DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
      INFORGE_DEPLOYMENT_REGION_SLUG: use1
      KNOWN_REGIONS: use1
      API_LISTEN_ADDR: 0.0.0.0:80
      MESH_LISTEN_ADDR: 0.0.0.0:9443
      MTLS_TRUST_BUNDLE_PATH: /certs/bundle.pem
      MTLS_LEAF_CERT_PATH: /certs/tenants.cert.pem
      MTLS_LEAF_KEY_PATH: /certs/tenants.key.pem
      JWT_SIGNING_KEY_PATH: /certs/jwt-signing.pem
      JWT_VERIFY_KEY_PATH: /certs/jwt-verify.pem
      # The SPA origin — Stripe success/cancel + portal return + OIDC callback
      # all redirect here. Same-origin through the Vite dev server (:5173).
      ACCOUNT_BASE_URL: http://localhost:5173
      OAUTH_REDIRECT_BASE: http://localhost:5173
      RUST_LOG: info,wardnet_tenants=debug
      # Dev only: print panic location + backtrace to stderr (the panic hook runs
      # even though the CatchPanic layer turns the panic into a logged 500).
      RUST_BACKTRACE: "1"
      # INFORGE-injected resource identity (dummies for local dev).
      INFORGE_SERVICE_NAMESPACE: wardnet
      INFORGE_INSTANCE_ID: tenants-dev-0
      INFORGE_HOST_ID: dev-node-0
      INFORGE_DEPLOYMENT_ENV: dev
    volumes:
      - ./certs:/certs:ro
    # No host port: the API is fail-closed without a PROXY v1 header, so it is
    # only reachable through the nginx sidecar below.
    expose:
      - "80"

  # L4 stream proxy: prepends a PROXY-protocol v1 header, then pipes raw TCP to
  # the tenants API. This is the only way to talk to the API listener (it drops
  # any connection lacking a valid PROXY v1 header). Point the Vite dev proxy
  # (VITE_API_PROXY) at http://localhost:8080.
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - tenants
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
