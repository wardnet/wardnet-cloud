# Dependency Review Action
#
# Scans dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in
# the PR. When marked as a required check, PRs introducing known-vulnerable
# packages are blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
name: 'Dependency Review'
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 'Checkout Repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Keep this in lockstep with source/.cargo/audit.toml — the same advisories,
          # accepted for the same reasons (no fix at any current stable version;
          # transitive via openidconnect / jsonwebtoken). See that file for the
          # per-advisory justification and removal trigger. The two gates use separate
          # config, so both must list these.
          #   GHSA-c38w-74pg-36hr = RUSTSEC-2023-0071 (rsa Marvin timing sidechannel)
          allow-ghsas: GHSA-c38w-74pg-36hr
