name: CI

# Orchestrator for pushes to `main`.
#
# Composes the same per-service reusable leaves as pr.yml, gated by
# detect-changes so only affected services build/test. Coverage ALSO runs here
# (push-to-main) so Codecov records a report for the merged main commit — that
# default-branch upload is what advances the coverage number/badge. main is
# squash-merged, so PR-head reports are never main ancestors; without this the
# default-branch number would freeze.
#
# Structure:
#   preflight        — detect-changes (outputs gate the leaves below)
#   build-<service>  — lint + tests + aarch64 build + artifact (gated)
#   coverage         — workspace coverage → Codecov (gated)
# (The mesh e2e harness runs nightly / on demand via e2e.yml, not here.)

on:
  push:
    branches: [main]

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions stay read-only. Each job/leaf elevates to the
# writes it actually needs via its own `permissions:` block — Scorecard's
# Token-Permissions check rewards this scoping.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      all: ${{ steps.detect.outputs.all }}
      tenants: ${{ steps.detect.outputs.tenants }}
      ddns: ${{ steps.detect.outputs.ddns }}
      tunneller: ${{ steps.detect.outputs.tunneller }}
      account-dashboard-app: ${{ steps.detect.outputs.account-dashboard-app }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/detect-changes
        id: detect

  build-tenants:
    name: Build tenants
    needs: preflight
    if: needs.preflight.outputs.tenants == 'true' || needs.preflight.outputs.all == 'true'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/build-service.yml
    with:
      service: tenants
    secrets: inherit

  build-ddns:
    name: Build ddns
    needs: preflight
    if: needs.preflight.outputs.ddns == 'true' || needs.preflight.outputs.all == 'true'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/build-service.yml
    with:
      service: ddns
    secrets: inherit

  build-tunneller:
    name: Build tunneller
    needs: preflight
    if: needs.preflight.outputs.tunneller == 'true' || needs.preflight.outputs.all == 'true'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/build-service.yml
    with:
      service: tunneller
    secrets: inherit

  account-dashboard-app:
    name: Account dashboard app
    needs: preflight
    if: needs.preflight.outputs.account-dashboard-app == 'true' || needs.preflight.outputs.all == 'true'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/account-dashboard-app.yml
    secrets: inherit

  # The mesh e2e harness runs nightly (schedule) + on demand, NOT on every push to
  # main — it is heavy and flaky on shared runners (see .github/workflows/e2e.yml).

  coverage:
    name: Coverage
    needs: preflight
    if: >
      needs.preflight.outputs.tenants == 'true' ||
      needs.preflight.outputs.ddns == 'true' ||
      needs.preflight.outputs.tunneller == 'true' ||
      needs.preflight.outputs.all == 'true'
    uses: ./.github/workflows/coverage.yml
    secrets: inherit
