# End-to-end mesh-mTLS topology: real Tenants + DDNS over SPIFFE mesh mTLS, two
# Postgres instances (global identity + regional operational), and a wiremock
# standing in for the Cloudflare API. Driven by `source/Makefile` (`make e2e-all`).
#
# Build context for the service images is the workspace root (`../..` → source/).
# Mesh leaves, the trust bundle, and the JWT keypair are generated by the xtask
# (`cargo run -p xtask -- gen-certs end2end-tests/mesh/certs`) and mounted read-only.

name: wardnet-e2e-mesh

services:
  pg-global:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  pg-regional:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  # Mock Cloudflare v4 API — DDNS points CLOUDFLARE_API_BASE here, so the harness
  # never touches a real Cloudflare zone.
  cloudflare:
    image: wiremock/wiremock:3.9.1
    command: ["--port", "8080", "--disable-banner"]
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro

  tenants:
    build:
      context: ../..
      dockerfile: crates/tenants/Dockerfile
    depends_on:
      pg-global:
        condition: service_healthy
    environment:
      GLOBAL_DATABASE_URL: postgres://postgres:postgres@pg-global:5432/postgres
      INFORGE_DEPLOYMENT_REGION_SLUG: use1
      KNOWN_REGIONS: use1
      API_LISTEN_ADDR: 0.0.0.0:80
      MESH_LISTEN_ADDR: 0.0.0.0:9443
      MTLS_TRUST_BUNDLE_PATH: /certs/bundle.pem
      MTLS_LEAF_CERT_PATH: /certs/tenants.cert.pem
      MTLS_LEAF_KEY_PATH: /certs/tenants.key.pem
      JWT_SIGNING_KEY_PATH: /certs/jwt-signing.pem
      JWT_VERIFY_KEY_PATH: /certs/jwt-verify.pem
      # Fast sweep so the tombstone is reaped within the test's poll window.
      TENANT_SWEEP_INTERVAL_SECS: "2"
      RUST_LOG: info
    volumes:
      - ./certs:/certs:ro
    ports:
      - "18080:80"

  ddns:
    build:
      context: ../..
      dockerfile: crates/ddns/Dockerfile
    depends_on:
      pg-regional:
        condition: service_healthy
      tenants:
        condition: service_started
      cloudflare:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@pg-regional:5432/postgres
      CLOUDFLARE_API_TOKEN: e2e-dummy-token
      CLOUDFLARE_ZONE_ID: e2e-zone
      CLOUDFLARE_API_BASE: http://cloudflare:8080
      SUBDOMAIN_PARENT: e2e.wardnet.test
      INFORGE_DEPLOYMENT_REGION_SLUG: use1
      API_LISTEN_ADDR: 0.0.0.0:80
      MESH_BASE_URL: https://tenants:9443
      MTLS_TRUST_BUNDLE_PATH: /certs/bundle.pem
      MTLS_LEAF_CERT_PATH: /certs/ddns.cert.pem
      MTLS_LEAF_KEY_PATH: /certs/ddns.key.pem
      # DDNS verifies daemon JWTs on its report-IP / ACME endpoints (offline).
      JWT_VERIFY_KEY_PATH: /certs/jwt-verify.pem
      # Tight reconcile loops so provision/reap happen within the test's poll window.
      PROVISIONER_INTERVAL_SECS: "2"
      REAPER_INTERVAL_SECS: "2"
      REAPER_JITTER_SECS: "0"
      RUST_LOG: info
    volumes:
      - ./certs:/certs:ro
