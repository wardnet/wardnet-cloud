name: Release DDNS

# Thin caller: a `ddns-v*` tag (or a manual dry run) drives the shared
# per-service release pipeline for wardnet-ddns. The version source of truth is
# source/crates/ddns/Cargo.toml; the tag must equal `ddns-v<version>`.
#
# To cut a release: bump source/crates/ddns/Cargo.toml `version`, commit, then
# tag + push (e.g. `git tag ddns-v0.1.1 && git push origin ddns-v0.1.1`).
# A workflow_dispatch on any ref is a dry run: builds + signs, never publishes.

on:
  push:
    tags:
      - "ddns-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release
    permissions:
      contents: write
      actions: read
      security-events: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release-service.yml
    with:
      service: ddns
    secrets: inherit
