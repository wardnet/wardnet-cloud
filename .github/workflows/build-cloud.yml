name: Build Cloud

# Reusable leaf for cloud service lint + test + aarch64 release build.
#
# Callers: ci.yml (push to main), pr.yml (PRs), release-cloud.yml (tag release).
# Produces one artifact:
#
#   wardnet-cloud-aarch64-unsigned — stripped binary tarball
#
# Deployment is NOT done here. A cloud release is cut by pushing a `cloud-v*`
# tag, which runs release-cloud.yml (build + sign + publish a GitHub Release)
# and then deploy-cloud.yml (dispatch the inforge raw-service deploy on the
# wardnet-infrastructure repo and block on it). See those workflows.

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-cloud:
    name: Check Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # Upload clippy SARIF to Code Scanning.
      security-events: write
      actions: read
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      pebble:
        image: ghcr.io/letsencrypt/pebble
        env:
          PEBBLE_VA_ALWAYS_VALID: "1"
          PEBBLE_VA_NOSLEEP: "1"
        ports:
          - 14000:14000
          - 15000:15000
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          workspaces: source
          cache-key: cloud

      - name: Install clippy SARIF tooling
        uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2
        with:
          tool: clippy-sarif,sarif-fmt

      - name: Format check
        run: cargo fmt --check --manifest-path source/Cargo.toml

      - name: Clippy
        # Pipe clippy JSON output through clippy-sarif so CI gets a SARIF
        # report for Code Scanning while still printing human-readable output.
        # `-D warnings` is enforced; any warning becomes a build failure.
        run: |
          set -o pipefail
          cargo clippy --manifest-path source/Cargo.toml \
            --all-targets --message-format=json -- -D warnings \
            | clippy-sarif | tee rust-clippy-cloud.sarif | sarif-fmt

      - name: Upload clippy findings to Code Scanning
        # Upload even if Clippy failed (captures the warnings that caused
        # the failure). Skipped when SARIF was not written (e.g. fmt fails
        # before clippy runs).
        if: always() && hashFiles('rust-clippy-cloud.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: rust-clippy-cloud.sarif
          category: rust-clippy-cloud
          wait-for-processing: true

      - name: Extract pebble WFE CA cert
        # The WFE's HTTPS listener cert is signed by the static minica CA
        # baked into the image, NOT by the issuance root served at
        # /roots/0. docker cp works on the scratch-based image (no shell).
        run: docker cp ${{ job.services.pebble.id }}:/test/certs/pebble.minica.pem /tmp/pebble-wfe-ca.pem

      - name: Tests
        env:
          CLOUD_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432
          CLOUD_TEST_PEBBLE_URL: https://localhost:14000/dir
          CLOUD_TEST_PEBBLE_CA: /tmp/pebble-wfe-ca.pem
        run: >
          cargo test --manifest-path source/Cargo.toml --all-targets
          -- --include-ignored

  build-cloud:
    name: Build Cloud (aarch64)
    needs: check-cloud
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup-rust
        with:
          targets: aarch64-unknown-linux-gnu
          workspaces: source
          cache-key: cloud-aarch64

      - name: Install aarch64 cross-compilation toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (aarch64-unknown-linux-gnu)
        # Set the linker via env var rather than relying on .cargo/config.toml
        # discovery — Cargo searches for config starting from the CWD, not the
        # --manifest-path directory, so the project-level config is not always
        # found when invoked from the repo root.
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: >
          cargo build --manifest-path source/Cargo.toml
          --release --target aarch64-unknown-linux-gnu

      - name: Strip binary
        run: >
          aarch64-linux-gnu-strip
          source/target/aarch64-unknown-linux-gnu/release/wardnet-cloud

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p build-artefacts
          cp source/target/aarch64-unknown-linux-gnu/release/wardnet-cloud \
             build-artefacts/wardnet-cloud
          chmod 0755 build-artefacts/wardnet-cloud
          tar -C build-artefacts -czf build-artefacts/wardnet-cloud-aarch64.tar.gz \
              wardnet-cloud

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wardnet-cloud-aarch64-unsigned
          path: build-artefacts/wardnet-cloud-aarch64.tar.gz
          retention-days: 7
