# L4 (stream) proxy that fronts the tenants API for local dev.
#
# The API listener is fail-closed: it reads a PROXY-protocol v1 header off every
# connection and drops anything without one (crates/common/src/serve.rs). nginx's
# stream module prepends a v1 header (`proxy_protocol on`) and otherwise pipes the
# bytes through untouched, so the wrapped plain-HTTP request reaches the API as if
# it had come through the production nginx front door.
#
# We use the stream (not http) module precisely because the http proxy module
# cannot *emit* a PROXY header to its upstream — only the stream module can.

events {}

stream {
    upstream tenants_api {
        server tenants:80;
    }

    server {
        listen 8080;
        proxy_pass tenants_api;
        # Prepend "PROXY TCP4 ... \r\n" so the API listener accepts the connection.
        proxy_protocol on;
    }
}
