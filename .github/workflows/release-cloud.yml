name: Release Cloud

# Tag-driven cloud release: build the aarch64 binary, package it with the
# inforge `run` entrypoint into a signed tarball, publish a GitHub Release, then
# hand off to deploy-cloud.yml (which dispatches the inforge raw-service deploy
# on wardnet-infrastructure and blocks on it).
#
# The cloud releases INDEPENDENTLY of the daemon: its tag prefix is `cloud-v*`
# and its version source of truth is source/Cargo.toml (pure SemVer), so
# cloud releases never collide with the daemon's `v*.*.*` CalVer tags.
#
# `workflow_dispatch` is a dry run on any ref: it builds + signs but stops short
# of publishing (release is gated on a `cloud-v*` tag) and never deploys.

on:
  push:
    tags:
      - "cloud-v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Resolve version from ref and guard against Cargo.toml
        id: version
        run: |
          set -euo pipefail

          # The cloud's version source of truth is source/Cargo.toml.
          # Pure SemVer (no CalVer date segments), so the tag compares directly
          # against the package version — unlike the daemon, which compares the
          # tag against ./CALVER because Cargo rejects CalVer's leading zeros.
          #
          # Read `version` ONLY from within the [package] table, so a future
          # [workspace.package] / dependency `version = ` line (or a reorder)
          # can't make the guard compare against the wrong string.
          CARGO_VERSION="$(awk -F' *= *' '
            /^\[/        { in_pkg = ($0 == "[package]") }
            in_pkg && $1 == "version" { gsub(/"/, "", $2); print $2; exit }
          ' source/Cargo.toml)"
          if [[ -z "${CARGO_VERSION}" ]]; then
            echo "::error::could not read [package] version from source/Cargo.toml"
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/cloud-v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#cloud-v}"

            if [[ "${VERSION}" != "${CARGO_VERSION}" ]]; then
              echo "::error::tag ${TAG} (version ${VERSION}) does not agree with source/Cargo.toml (${CARGO_VERSION}). Bump Cargo.toml and re-tag."
              exit 1
            fi
          else
            # workflow_dispatch dry run on a non-tag ref — use the Cargo version.
            TAG=""
            VERSION="${CARGO_VERSION}"
          fi

          if [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "prerelease=${PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

          echo "Cloud release version: ${VERSION} (tag=${TAG:-<dispatch>}, prerelease=${PRERELEASE})"

  build:
    name: Build Cloud
    needs: resolve
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/build-cloud.yml
    secrets: inherit

  # Fail BEFORE publishing if the deploy can't possibly succeed, to avoid a
  # half-applied release (a published GitHub Release that was never deployed).
  # Catches a missing/misscoped bot app AND the deploy-raw-service.yml workflow
  # not yet existing on the infra repo's default branch (repository_dispatch
  # only runs workflows from the default branch).
  preflight-deploy:
    name: Preflight deploy prerequisites
    needs: resolve
    if: startsWith(github.ref, 'refs/tags/cloud-v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Mint infra deploy token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: wardnet-infrastructure

      - name: Verify the bot app can reach the infra deploy workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INFRA_REPO: ${{ github.repository_owner }}/wardnet-infrastructure
        run: |
          set -euo pipefail
          gh api "repos/${INFRA_REPO}" --jq .full_name
          gh api "repos/${INFRA_REPO}/actions/workflows/deploy-raw-service.yml" --jq .path \
            || { echo "::error::bot app cannot see deploy-raw-service.yml on ${INFRA_REPO} default branch (not merged yet, or app lacks actions:read)"; exit 1; }

  release:
    name: Publish GitHub Release
    needs: [resolve, build, preflight-deploy]
    # Publish only on an actual cloud-v* tag. workflow_dispatch exercises the
    # full build + sign path but stops before `gh release create`.
    if: startsWith(github.ref, 'refs/tags/cloud-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      # OIDC + attestation upload for actions/attest-build-provenance.
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download cloud aarch64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wardnet-cloud-aarch64-unsigned
          path: release-staging/

      - name: Assemble run+binary tarball
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail

          # build-cloud.yml ships wardnet-cloud-aarch64.tar.gz containing just
          # the binary. The inforge raw-service contract requires the deployed
          # tarball's root to hold an executable `run` entrypoint plus the
          # binary, so repack with source/deploy/run alongside it.
          WORK="staged-aarch64"
          mkdir -p "${WORK}"
          tar -C "${WORK}" -xzf release-staging/wardnet-cloud-aarch64.tar.gz
          install -m 0755 source/deploy/run "${WORK}/run"

          # Sanity-guard the built binary: it must be a valid aarch64 ELF (catches
          # a wrong-target/corrupt build before it ships). Runtime health — that
          # the process actually comes up — is verified host-side by inforge's
          # deploy (unit restart) which deploy-cloud.yml blocks on.
          DESC="$(file -b "${WORK}/wardnet-cloud")"
          if ! printf '%s' "${DESC}" | grep -qiE 'ELF 64-bit.*(aarch64|ARM aarch64)'; then
            echo "::error::built cloud binary is not an aarch64 ELF: ${DESC}"
            exit 1
          fi

          DST="release-staging/wardnet-cloud-${VERSION}-aarch64.tar.gz"
          tar -C "${WORK}" -czf "${DST}" run wardnet-cloud
          rm -rf "${WORK}" release-staging/wardnet-cloud-aarch64.tar.gz
          ls -l release-staging

      - name: Sign release tarball
        uses: ./.github/actions/sign-release-tarball
        with:
          tarball: release-staging/wardnet-cloud-${{ needs.resolve.outputs.version }}-aarch64.tar.gz
          comment: wardnet-cloud ${{ needs.resolve.outputs.version }} (aarch64)
          minisign-key-b64: ${{ secrets.WARDNET_MINISIGN_KEY }}
          minisign-password: ${{ secrets.WARDNET_MINISIGN_PASSWORD }}

      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release-staging/*.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
          VERSION: ${{ needs.resolve.outputs.version }}
          PRERELEASE: ${{ needs.resolve.outputs.prerelease }}
        run: |
          set -euo pipefail
          ARGS=(--verify-tag --title "Wardnet Cloud ${VERSION}")

          NOTES_FILE="docs/releases/cloud-v${VERSION}.md"
          if [[ -f "${NOTES_FILE}" ]]; then
            echo "Using release notes from ${NOTES_FILE}"
            ARGS+=(--notes-file "${NOTES_FILE}")
          else
            echo "No ${NOTES_FILE} found — falling back to auto-generated notes"
            ARGS+=(--generate-notes)
          fi

          if [[ "${PRERELEASE}" == "true" ]]; then
            ARGS+=(--prerelease)
          fi

          gh release create "${TAG}" "${ARGS[@]}" \
            release-staging/*.tar.gz \
            release-staging/*.tar.gz.sha256 \
            release-staging/*.tar.gz.minisig

  deploy:
    name: Deploy Cloud
    needs: [resolve, release]
    if: startsWith(github.ref, 'refs/tags/cloud-v')
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-cloud.yml
    with:
      tag: ${{ needs.resolve.outputs.tag }}
    secrets: inherit
