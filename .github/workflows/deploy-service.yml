name: Deploy Service

# Deploys a published per-service cloud release onto wardnet infrastructure via
# inforge's raw-service path. It does NOT deploy directly: it triggers the
# `deploy-raw-service` workflow on the wardnet-infrastructure repo (where the
# deploy SSH key lives — it is never held here) and blocks until that run
# finishes, failing if it fails.
#
# Two entry points:
#   * workflow_call  — release-service.yml chains here after publishing the
#     GitHub Release, so a `<service>-v*` tag runs release → deploy in sequence.
#   * workflow_dispatch — run "Deploy Service" by hand for a given service+tag
#     (re-deploy, or deploy a tag whose auto-deploy was skipped).
#
# `repository_dispatch` is fire-and-forget (it returns no run handle), so the
# job triggers it, then discovers and watches the resulting infra run. A
# cross-repo reusable `workflow_call` against the infra workflow is deliberately
# avoided: it would execute in THIS repo's context, where the infra-only
# DEPLOY_PRIVATE_KEY is unavailable.
#
# The regional fan-out (ddns/tunneller run in every region; tenants is global)
# is the infra side's concern — this job names the service + environment + sha
# + artifact_url; inforge's deployments/<service>.yaml decides the host set.

on:
  workflow_call:
    inputs:
      service:
        description: Service name — tenants | ddns | tunneller.
        type: string
        required: true
      tag:
        description: Release tag (e.g. tenants-v0.1.0).
        type: string
        required: true
  workflow_dispatch:
    inputs:
      service:
        description: Service name — tenants | ddns | tunneller.
        type: choice
        options: [tenants, ddns, tunneller]
        required: true
      tag:
        description: Release tag (e.g. tenants-v0.1.0).
        type: string
        required: true

# Serialize deploys per service: at most one `deploy-raw-service` dispatch for a
# given service is ever outstanding, which is what lets the run-discovery below
# unambiguously attribute the newest matching infra run to this job.
# cancel-in-progress: false so a queued deploy waits rather than clobbering an
# in-flight one.
concurrency:
  group: deploy-${{ inputs.service }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Dispatch inforge raw-service deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Mint a short-lived installation token from the bot GitHub App, scoped to
      # the infra repo. Used only for the cross-repo dispatch + run-watch; reads
      # of our own repo use the job's default GITHUB_TOKEN.
      - name: Mint infra deploy token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: wardnet-infrastructure

      - name: Dispatch deploy-raw-service and block on it
        env:
          SELF: ${{ github.repository }}
          SERVICE: ${{ inputs.service }}
          TAG: ${{ inputs.tag }}
          SELF_TOKEN: ${{ github.token }}
          INFRA_TOKEN: ${{ steps.app-token.outputs.token }}
          # The repository_dispatch is attributed to the bot app's actor login,
          # `<app-slug>[bot]`. Used to scope run-discovery to OUR dispatches.
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          INFRA_REPO: ${{ github.repository_owner }}/wardnet-infrastructure
        run: |
          set -euo pipefail
          WF=deploy-raw-service.yml

          # Derive the inputs inforge needs, from our own repo:
          #   sha          — the service build commit the tag points at (keys the
          #                  artifact in R2 + the infra manifest).
          #   artifact_url — the aarch64 release tarball asset on this tag. gh's
          #                  asset `.url` is the browser download URL
          #                  (releases/download/...), which is what the infra
          #                  side curls; `.apiUrl` would be the api.github.com one.
          SHA="$(GH_TOKEN="${SELF_TOKEN}" gh api "repos/${SELF}/commits/${TAG}" --jq .sha)"
          if [[ -z "${SHA}" ]]; then
            echo "::error::could not resolve a commit SHA for tag ${TAG}"
            exit 1
          fi
          URL="$(GH_TOKEN="${SELF_TOKEN}" gh release view "${TAG}" -R "${SELF}" --json assets \
                  --jq '.assets[] | select(.name | endswith("-aarch64.tar.gz")) | .url')"
          if [[ -z "${URL}" ]]; then
            echo "::error::no -aarch64.tar.gz asset found on release ${TAG}"
            exit 1
          fi
          echo "Deploying ${SERVICE} ${SELF}@${SHA} → ${INFRA_REPO} (artifact: ${URL})"

          export GH_TOKEN="${INFRA_TOKEN}"

          # repository_dispatch returns no run id, so correlate by polling. The
          # per-service `deploy-<service>` concurrency guarantees no other
          # dispatch for THIS service from this repo is outstanding, and the
          # filters below scope to deploy-raw-service runs triggered by THIS bot
          # after our POST — so the single newest match is ours. (A different
          # service dispatched by the same bot within the poll window is the
          # only residual ambiguity; exact correlation would need the infra
          # workflow to echo a token.)
          SINCE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh api -X POST "repos/${INFRA_REPO}/dispatches" \
            -f 'event_type=deploy-raw-service' \
            -F "client_payload[service]=${SERVICE}" \
            -F 'client_payload[environment]=prd' \
            -F "client_payload[sha]=${SHA}" \
            -F "client_payload[artifact_url]=${URL}"

          RUN_ID=""
          for _ in $(seq 1 30); do
            RUN_ID="$(gh run list -R "${INFRA_REPO}" --workflow "${WF}" \
              --event repository_dispatch --user "${APP_SLUG}[bot]" \
              --created ">=${SINCE}" \
              --json databaseId --jq '.[0].databaseId' || true)"
            [[ -n "${RUN_ID}" ]] && break
            sleep 10
          done
          if [[ -z "${RUN_ID}" ]]; then
            echo "::error::infra ${WF} run not found after dispatch (timed out)"
            exit 1
          fi

          echo "Watching infra run ${RUN_ID}: https://github.com/${INFRA_REPO}/actions/runs/${RUN_ID}"
          # Blocks until the run completes; --exit-status makes this step (and
          # the whole release) fail iff the infra deploy fails.
          gh run watch "${RUN_ID}" -R "${INFRA_REPO}" --exit-status
