name: Release Tenants

# Thin caller: a `tenants-v*` tag (or a manual dry run) drives the shared
# per-service release pipeline for wardnet-tenants. The version source of truth
# is source/crates/tenants/Cargo.toml; the tag must equal `tenants-v<version>`.
#
# To cut a release: bump source/crates/tenants/Cargo.toml `version`, commit,
# then tag + push (e.g. `git tag tenants-v0.1.1 && git push origin tenants-v0.1.1`).
# A workflow_dispatch on any ref is a dry run: builds + signs, never publishes.

on:
  push:
    tags:
      - "tenants-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release
    permissions:
      contents: write
      actions: read
      security-events: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release-service.yml
    with:
      service: tenants
    secrets: inherit
