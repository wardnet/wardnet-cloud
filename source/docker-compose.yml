services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  pebble:
    image: letsencrypt/pebble
    environment:
      PEBBLE_VA_ALWAYS_VALID: "1"
      PEBBLE_VA_NOSLEEP: "1"
    ports:
      - "14000:14000"
      - "15000:15000"
